<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="40%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="navGradT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#152e75"/>
    </linearGradient>
    <linearGradient id="progressGradT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="phoneShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="cardShadowT">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a3a8a" flood-opacity="0.1"/>
    </filter>
    <clipPath id="phoneScreenClip">
      <rect x="740" y="50" width="210" height="455" rx="18"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="0.5" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="0.5" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="0.5" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="0.5" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="white" stroke-width="0.5" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="0.5" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="0.5" transform="translate(0,120)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="0.5" transform="translate(0,180)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="0.5" transform="translate(0,240)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="white" stroke-width="0.5" transform="translate(0,300)"/>
  </g>

  <!-- Decorative blobs -->
  <circle cx="100" cy="500" r="120" fill="#818cf8" opacity="0.08"/>
  <circle cx="650" cy="100" r="80" fill="#c084fc" opacity="0.1"/>
  <circle cx="1100" cy="550" r="100" fill="#f472b6" opacity="0.06"/>
  <circle cx="400" cy="50" r="60" fill="#60a5fa" opacity="0.08"/>

  <!-- LEFT SIDE CONTENT -->

  <!-- GAMIFICATION label pill -->
  <rect x="60" y="100" width="200" height="36" rx="18" fill="url(#accentGrad)"/>
  <text x="160" y="124" font-family="Inter" font-size="14" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">GAMIFICATION</text>

  <!-- Big title -->
  <text x="60" y="195" font-family="'Rounded Mplus 1c'" font-size="38" font-weight="800" fill="white">ゲーミフィケーション</text>
  <text x="60" y="245" font-family="'Rounded Mplus 1c'" font-size="38" font-weight="800" fill="white">要素</text>

  <!-- Subtitle -->
  <text x="60" y="290" font-family="Inter,'Rounded Mplus 1c'" font-size="15" font-weight="700" fill="rgba(255,255,255,0.6)">XP獲得 · レベルアップ · デイリー目標 · ランク制度</text>

  <!-- Feature pills -->
  <rect x="60" y="320" width="150" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="135" y="346" font-family="Inter,'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="white" text-anchor="middle">⭐ XPシステム</text>

  <rect x="224" y="320" width="140" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="294" y="346" font-family="Inter,'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="white" text-anchor="middle">🔥 ストリーク</text>

  <rect x="378" y="320" width="170" height="40" rx="20" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="463" y="346" font-family="Inter,'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="white" text-anchor="middle">🏆 6段階ランク</text>

  <!-- App name badge -->
  <rect x="60" y="400" width="220" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="170" y="428" font-family="'Rounded Mplus 1c'" font-size="15" font-weight="700" fill="rgba(255,255,255,0.8)" text-anchor="middle">英検3級 学習アプリ</text>

  <!-- RIGHT SIDE - Phone Mockup -->
  <!-- Phone frame -->
  <rect x="730" y="40" width="230" height="475" rx="24" fill="#1e1b4b" stroke="rgba(255,255,255,0.15)" stroke-width="2" filter="url(#phoneShadow)"/>
  <!-- Phone screen -->
  <rect x="740" y="50" width="210" height="455" rx="18" fill="#eef1f8"/>

  <g clip-path="url(#phoneScreenClip)">
    <!-- Status bar -->
    <text x="756" y="68" font-family="Inter" font-size="9" font-weight="700" fill="#1a1a2e">9:41</text>

    <!-- Daily Progress -->
    <rect x="748" y="76" width="194" height="32" rx="10" fill="white" filter="url(#cardShadowT)"/>
    <text x="756" y="92" font-family="'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#64748b">今日の進捗</text>
    <text x="920" y="92" font-family="Inter,'Rounded Mplus 1c'" font-size="8" font-weight="700" fill="#1a3a8a" text-anchor="end">12 / 20</text>
    <rect x="756" y="97" width="178" height="5" rx="2.5" fill="#e2e6f0"/>
    <rect x="756" y="97" width="107" height="5" rx="2.5" fill="url(#progressGradT)"/>

    <!-- XP Display -->
    <rect x="748" y="114" width="194" height="28" rx="10" fill="white" filter="url(#cardShadowT)"/>
    <rect x="754" y="119" width="42" height="16" rx="8" fill="url(#blueGrad)"/>
    <text x="775" y="131" font-family="Inter,'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="white" text-anchor="middle">⭐ Lv.3</text>
    <text x="804" y="131" font-family="'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#64748b">シルバー</text>
    <text x="920" y="131" font-family="Inter,'Rounded Mplus 1c'" font-size="9" font-weight="800" fill="#1a3a8a" text-anchor="end">420 XP</text>

    <!-- Tab Switcher -->
    <rect x="748" y="148" width="194" height="24" rx="8" fill="#e2e6f0"/>
    <rect x="750" y="150" width="95" height="20" rx="7" fill="url(#blueGrad)"/>
    <text x="798" y="164" font-family="'Rounded Mplus 1c'" font-size="8" font-weight="700" fill="white" text-anchor="middle">単語カード</text>
    <text x="893" y="164" font-family="'Rounded Mplus 1c'" font-size="8" font-weight="700" fill="#94a3b8" text-anchor="middle">穴埋め</text>

    <!-- Flashcard -->
    <rect x="748" y="178" width="194" height="170" rx="12" fill="white" filter="url(#cardShadowT)"/>
    <text x="756" y="194" font-family="'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#64748b">単語カード</text>
    <text x="830" y="194" font-family="Inter,'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#2563b0">スコア: 8</text>
    <text x="920" y="194" font-family="Inter,'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#f97316" text-anchor="end">🔥 5連続!</text>

    <!-- Card content -->
    <rect x="756" y="202" width="178" height="80" rx="8" fill="#f8fafc" stroke="#e2e6f0" stroke-width="0.5"/>
    <text x="845" y="250" font-family="Inter" font-size="18" font-weight="700" fill="#1a1a2e" text-anchor="middle">beautiful</text>

    <!-- Correct banner -->
    <rect x="756" y="288" width="178" height="22" rx="6" fill="url(#greenGrad)"/>
    <text x="845" y="303" font-family="Inter,'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="white" text-anchor="middle">✓ 正解! 5連続正解! +15 XP</text>

    <!-- Buttons -->
    <rect x="756" y="316" width="85" height="22" rx="8" fill="none" stroke="#2563b0" stroke-width="1"/>
    <text x="799" y="331" font-family="'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#2563b0" text-anchor="middle">あとで練習</text>
    <rect x="849" y="316" width="85" height="22" rx="8" fill="url(#blueGrad)"/>
    <text x="892" y="331" font-family="'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="white" text-anchor="middle">知ってる!</text>

    <!-- Rank & Streak mini cards -->
    <rect x="748" y="356" width="94" height="44" rx="10" fill="white" filter="url(#cardShadowT)"/>
    <text x="758" y="372" font-family="Inter" font-size="8">🏆</text>
    <text x="772" y="372" font-family="'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#1a1a2e">シルバー</text>
    <text x="758" y="388" font-family="Inter,'Rounded Mplus 1c'" font-size="6" font-weight="700" fill="#64748b">Lv.3 420 XP</text>
    <rect x="758" y="393" width="74" height="3" rx="1.5" fill="#e2e6f0"/>
    <rect x="758" y="393" width="32" height="3" rx="1.5" fill="url(#progressGradT)"/>

    <rect x="848" y="356" width="94" height="44" rx="10" fill="white" filter="url(#cardShadowT)"/>
    <text x="858" y="372" font-family="Inter" font-size="8">🔥</text>
    <text x="872" y="372" font-family="'Rounded Mplus 1c'" font-size="7" font-weight="700" fill="#1a1a2e">連続学習</text>
    <text x="858" y="390" font-family="Inter,'Rounded Mplus 1c'" font-size="11" font-weight="800" fill="#f97316">5日</text>

    <!-- Calendar mini -->
    <rect x="748" y="406" width="194" height="40" rx="10" fill="white" filter="url(#cardShadowT)"/>
    <text x="756" y="420" font-family="Inter,'Rounded Mplus 1c'" font-size="6" font-weight="700" fill="#1a1a2e">🔥 5日連続学習</text>
    <!-- Mini day squares -->
    <rect x="756" y="425" width="14" height="14" rx="3" fill="#e2e6f0"/>
    <rect x="775" y="425" width="14" height="14" rx="3" fill="#e2e6f0"/>
    <rect x="794" y="425" width="14" height="14" rx="3" fill="#16a34a"/>
    <rect x="813" y="425" width="14" height="14" rx="3" fill="#16a34a"/>
    <rect x="832" y="425" width="14" height="14" rx="3" fill="#16a34a"/>
    <rect x="851" y="425" width="14" height="14" rx="3" fill="#16a34a"/>
    <rect x="870" y="425" width="14" height="14" rx="3" fill="#16a34a"/>

    <!-- Bottom nav -->
    <rect x="740" y="462" width="210" height="43" fill="url(#navGradT)"/>
    <text x="772" y="483" font-family="'Rounded Mplus 1c'" font-size="6" font-weight="700" fill="white" text-anchor="middle">学習</text>
    <text x="820" y="483" font-family="'Rounded Mplus 1c'" font-size="6" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">復習</text>
    <text x="878" y="483" font-family="'Rounded Mplus 1c'" font-size="6" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">マイページ</text>
    <text x="928" y="483" font-family="'Rounded Mplus 1c'" font-size="6" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">管理</text>
  </g>

  <!-- Phone notch -->
  <rect x="815" y="42" width="60" height="10" rx="5" fill="#1e1b4b"/>
</svg>