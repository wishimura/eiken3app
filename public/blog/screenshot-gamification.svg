<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="navGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#152e75"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="correctGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-3%" width="110%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a8a" flood-opacity="0.07"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="0" y="0" width="375" height="812" rx="40"/>
    </clipPath>
  </defs>

  <!-- Phone frame -->
  <rect width="375" height="812" rx="40" fill="#eef1f8"/>
  <g clip-path="url(#phoneClip)">

    <!-- Status bar -->
    <rect x="0" y="0" width="375" height="48" fill="#eef1f8"/>
    <text x="187" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#1a2040" text-anchor="middle">9:41</text>

    <!-- Daily Progress Bar -->
    <g transform="translate(20, 64)">
      <text x="0" y="14" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="500" fill="#6b7494">今日の進捗</text>
      <text x="335" y="14" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#1a2040" text-anchor="end">12 / 20</text>
      <rect x="0" y="22" width="335" height="10" rx="5" fill="#e2e6f0"/>
      <rect x="0" y="22" width="201" height="10" rx="5" fill="url(#progressGrad)"/>
    </g>

    <!-- XP Display + Tab Switcher -->
    <g transform="translate(20, 108)">
      <!-- Level badge -->
      <rect x="0" y="0" width="54" height="24" rx="12" fill="url(#btnGrad)"/>
      <text x="12" y="16" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="700" fill="white">&#9733; Lv.3</text>
      <!-- Rank + XP -->
      <text x="62" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#1a2040">シルバー</text>
      <text x="108" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#6b7494">420 XP</text>
      <!-- XP progress bar -->
      <rect x="62" y="16" width="80" height="6" rx="3" fill="#e2e6f0"/>
      <rect x="62" y="16" width="32" height="6" rx="3" fill="url(#progressGrad)"/>

      <!-- Tab switcher -->
      <rect x="210" y="-2" width="125" height="32" rx="16" fill="#e8ecf4" stroke="#dde1ed" stroke-width="1"/>
      <rect x="213" y="1" width="58" height="26" rx="13" fill="url(#btnGrad)"/>
      <text x="242" y="18" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="white" text-anchor="middle">単語カード</text>
      <text x="300" y="18" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#6b7494" text-anchor="middle">穴埋め</text>
    </g>

    <!-- Study Card -->
    <g transform="translate(20, 156)">
      <rect x="0" y="0" width="335" height="380" rx="20" fill="white" filter="url(#cardShadow)"/>

      <!-- Header -->
      <text x="20" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#6b7494" letter-spacing="1.5">単語カード</text>

      <!-- Score + Streak -->
      <text x="20" y="52" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#1a3a8a">スコア: 8</text>
      <text x="100" y="52" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#f97316">&#128293; 5連続!</text>

      <!-- Mode toggle -->
      <rect x="200" y="20" width="115" height="30" rx="6" fill="#f0f2f8" stroke="#dde1ed" stroke-width="1"/>
      <rect x="203" y="23" width="52" height="24" rx="5" fill="url(#btnGrad)"/>
      <text x="229" y="39" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">英→日</text>
      <text x="283" y="39" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="#6b7494" text-anchor="middle">日→英</text>

      <!-- Flashcard -->
      <rect x="16" y="68" width="303" height="160" rx="16" fill="#f8f9fc" stroke="#e2e6f0" stroke-width="1"/>
      <text x="167" y="155" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="600" fill="#1a2040" text-anchor="middle">beautiful</text>
      <text x="167" y="200" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#9ca3bf" text-anchor="middle">タップしてめくる</text>

      <!-- Correct feedback banner -->
      <rect x="16" y="240" width="303" height="52" rx="16" fill="url(#correctGrad)"/>
      <text x="50" y="262" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="20" fill="white">&#10003;</text>
      <text x="74" y="264" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="700" fill="white">正解!</text>
      <text x="74" y="280" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="white" opacity="0.9">5連続正解!</text>
      <text x="260" y="268" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" fill="white" opacity="0.9">+15 XP</text>
      <rect x="286" y="254" width="24" height="22" rx="6" fill="white" opacity="0.2"/>
      <text x="298" y="269" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="500" fill="white" text-anchor="middle">次へ</text>

      <!-- XP float animation indicator -->
      <text x="280" y="236" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" fill="#2563b0" opacity="0.7">+15 XP</text>

      <!-- Action buttons -->
      <rect x="16" y="304" width="145" height="48" rx="12" fill="white" stroke="#e2e6f0" stroke-width="1"/>
      <text x="88" y="333" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="500" fill="#1a2040" text-anchor="middle">あとで練習</text>

      <rect x="174" y="304" width="145" height="48" rx="12" fill="url(#btnGrad)"/>
      <text x="246" y="333" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" font-weight="500" fill="white" text-anchor="middle">知ってる!</text>
    </g>

    <!-- Bottom Navigation -->
    <rect x="0" y="740" width="375" height="72" fill="url(#navGrad)"/>
    <!-- Nav items -->
    <g font-family="-apple-system,BlinkMacSystemFont,sans-serif">
      <!-- 学習 (active) -->
      <rect x="12" y="747" width="76" height="52" rx="16" fill="white" opacity="0.15"/>
      <text x="50" y="772" font-size="18" fill="white" text-anchor="middle">&#128214;</text>
      <text x="50" y="790" font-size="10" font-weight="600" fill="white" text-anchor="middle">学習</text>
      <!-- 復習 -->
      <text x="144" y="772" font-size="18" fill="white" opacity="0.6" text-anchor="middle">&#128278;</text>
      <text x="144" y="790" font-size="10" font-weight="600" fill="white" opacity="0.6" text-anchor="middle">復習</text>
      <!-- マイページ -->
      <text x="237" y="772" font-size="18" fill="white" opacity="0.6" text-anchor="middle">&#128100;</text>
      <text x="237" y="790" font-size="10" font-weight="600" fill="white" opacity="0.6" text-anchor="middle">マイページ</text>
      <!-- 管理 -->
      <text x="331" y="772" font-size="18" fill="white" opacity="0.6" text-anchor="middle">&#9881;</text>
      <text x="331" y="790" font-size="10" font-weight="600" fill="white" opacity="0.6" text-anchor="middle">管理</text>
    </g>

  </g>
</svg>
