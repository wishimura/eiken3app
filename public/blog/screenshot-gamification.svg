<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="navGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#152e75"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="correctGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-3%" width="110%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a8a" flood-opacity="0.07"/>
    </filter>
    <clipPath id="phoneClip">
      <rect x="0" y="0" width="375" height="812" rx="40"/>
    </clipPath>
  </defs>

  <rect width="375" height="812" rx="40" fill="#eef1f8"/>
  <g clip-path="url(#phoneClip)">

    <!-- Status Bar -->
    <rect x="0" y="0" width="375" height="50" fill="#eef1f8"/>
    <text x="32" y="32" font-family="Inter" font-size="15" font-weight="700" fill="#1a1a2e">9:41</text>
    <!-- Signal/battery icons -->
    <rect x="290" y="20" width="22" height="11" rx="2" stroke="#1a1a2e" stroke-width="1.2" fill="none"/>
    <rect x="292" y="22" width="16" height="7" rx="1" fill="#1a1a2e"/>
    <rect x="314" y="23" width="2" height="5" rx="1" fill="#1a1a2e"/>
    <g transform="translate(260,18)">
      <rect x="0" y="8" width="3" height="5" rx="0.5" fill="#1a1a2e"/>
      <rect x="5" y="5" width="3" height="8" rx="0.5" fill="#1a1a2e"/>
      <rect x="10" y="2" width="3" height="11" rx="0.5" fill="#1a1a2e"/>
      <rect x="15" y="0" width="3" height="13" rx="0.5" fill="#1a1a2e"/>
    </g>

    <!-- Daily Progress Card -->
    <rect x="16" y="58" width="343" height="56" rx="16" fill="white" filter="url(#cardShadow)"/>
    <text x="32" y="80" font-family="'Rounded Mplus 1c'" font-size="12" font-weight="700" fill="#64748b">今日の進捗</text>
    <text x="310" y="80" font-family="Inter,'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="#1a3a8a" text-anchor="end">12 / 20</text>
    <rect x="32" y="90" width="311" height="10" rx="5" fill="#e2e6f0"/>
    <rect x="32" y="90" width="187" height="10" rx="5" fill="url(#progressGrad)"/>

    <!-- XP / Level Display -->
    <rect x="16" y="124" width="343" height="52" rx="16" fill="white" filter="url(#cardShadow)"/>
    <!-- Lv pill -->
    <rect x="28" y="133" width="68" height="28" rx="14" fill="url(#progressGrad)"/>
    <text x="62" y="152" font-family="Inter,'Rounded Mplus 1c'" font-size="13" font-weight="700" fill="white" text-anchor="middle">⭐ Lv.3</text>
    <!-- Rank -->
    <text x="106" y="148" font-family="'Rounded Mplus 1c'" font-size="12" font-weight="700" fill="#64748b">シルバー</text>
    <!-- XP -->
    <text x="280" y="148" font-family="Inter,'Rounded Mplus 1c'" font-size="15" font-weight="800" fill="#1a3a8a" text-anchor="end">420 XP</text>
    <!-- XP progress bar -->
    <rect x="28" y="162" width="200" height="6" rx="3" fill="#e2e6f0"/>
    <rect x="28" y="162" width="84" height="6" rx="3" fill="url(#progressGrad)"/>

    <!-- Tab Switcher -->
    <rect x="16" y="188" width="343" height="44" rx="14" fill="#e2e6f0"/>
    <rect x="20" y="192" width="167" height="36" rx="12" fill="url(#btnGrad)"/>
    <text x="104" y="215" font-family="'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="white" text-anchor="middle">単語カード</text>
    <text x="271" y="215" font-family="'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="#64748b" text-anchor="middle">穴埋め</text>

    <!-- Flashcard Card -->
    <rect x="16" y="244" width="343" height="440" rx="20" fill="white" filter="url(#cardShadow)"/>

    <!-- Card Header -->
    <text x="32" y="274" font-family="'Rounded Mplus 1c'" font-size="13" font-weight="700" fill="#64748b">単語カード</text>
    <text x="185" y="274" font-family="Inter,'Rounded Mplus 1c'" font-size="13" font-weight="700" fill="#2563b0">スコア: 8</text>
    <text x="290" y="274" font-family="Inter,'Rounded Mplus 1c'" font-size="13" font-weight="700" fill="#f97316">🔥 5連続!</text>

    <!-- Mode Toggle -->
    <rect x="110" y="286" width="155" height="32" rx="16" fill="#e2e6f0"/>
    <rect x="114" y="290" width="73" height="24" rx="12" fill="url(#btnGrad)"/>
    <text x="150" y="307" font-family="'Rounded Mplus 1c'" font-size="12" font-weight="700" fill="white" text-anchor="middle">英→日</text>
    <text x="228" y="307" font-family="'Rounded Mplus 1c'" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle">日→英</text>

    <!-- Flashcard Area -->
    <rect x="32" y="330" width="311" height="180" rx="16" fill="#f8fafc" stroke="#e2e6f0" stroke-width="1"/>
    <text x="187" y="430" font-family="Inter" font-size="36" font-weight="700" fill="#1a1a2e" text-anchor="middle">beautiful</text>

    <!-- Correct Feedback Banner -->
    <rect x="32" y="522" width="311" height="44" rx="12" fill="url(#correctGrad)"/>
    <text x="187" y="549" font-family="Inter,'Rounded Mplus 1c'" font-size="13" font-weight="700" fill="white" text-anchor="middle">✓ 正解! 5連続正解! +15 XP</text>

    <!-- Action Buttons -->
    <rect x="32" y="580" width="148" height="44" rx="14" fill="none" stroke="#2563b0" stroke-width="2"/>
    <text x="106" y="607" font-family="'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="#2563b0" text-anchor="middle">あとで練習</text>

    <rect x="195" y="580" width="148" height="44" rx="14" fill="url(#btnGrad)"/>
    <text x="269" y="607" font-family="'Rounded Mplus 1c'" font-size="14" font-weight="700" fill="white" text-anchor="middle">知ってる!</text>

    <!-- Bottom Tab Bar -->
    <rect x="0" y="732" width="375" height="80" rx="0" fill="url(#navGrad)"/>
    <rect x="0" y="732" width="375" height="2" fill="rgba(255,255,255,0.1)"/>

    <!-- Nav item 1 - 学習 (active) -->
    <g transform="translate(47,745)">
      <rect x="-12" y="-4" width="56" height="52" rx="12" fill="rgba(255,255,255,0.12)"/>
      <rect x="8" y="0" width="16" height="12" rx="2" fill="white"/>
      <rect x="11" y="3" width="4" height="3" rx="0.5" fill="#1a3a8a"/>
      <rect x="17" y="3" width="4" height="3" rx="0.5" fill="#1a3a8a"/>
      <text x="16" y="32" font-family="'Rounded Mplus 1c'" font-size="10" font-weight="700" fill="white" text-anchor="middle">学習</text>
    </g>
    <!-- Nav item 2 - 復習 -->
    <g transform="translate(141,745)">
      <circle cx="16" cy="6" r="7" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <path d="M13,6 L16,9 L19,3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <text x="16" y="32" font-family="'Rounded Mplus 1c'" font-size="10" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">復習</text>
    </g>
    <!-- Nav item 3 - マイページ -->
    <g transform="translate(235,745)">
      <circle cx="16" cy="5" r="5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <path d="M6,18 Q16,10 26,18" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <text x="16" y="32" font-family="'Rounded Mplus 1c'" font-size="10" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">マイページ</text>
    </g>
    <!-- Nav item 4 - 管理 -->
    <g transform="translate(329,745)">
      <rect x="4" y="0" width="16" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="4" y="5" width="16" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="4" y="10" width="16" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
      <text x="12" y="32" font-family="'Rounded Mplus 1c'" font-size="10" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle">管理</text>
    </g>

    <!-- Home indicator -->
    <rect x="122" y="798" width="131" height="5" rx="2.5" fill="#1a1a2e" opacity="0.2"/>
  </g>
</svg>