<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <defs>
    <linearGradient id="navGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#152e75"/>
    </linearGradient>
    <linearGradient id="btnGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="progressGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="accGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <filter id="cardShadow2" x="-5%" y="-3%" width="110%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a8a" flood-opacity="0.07"/>
    </filter>
    <clipPath id="phoneClip2">
      <rect x="0" y="0" width="375" height="812" rx="40"/>
    </clipPath>
  </defs>

  <rect width="375" height="812" rx="40" fill="#eef1f8"/>
  <g clip-path="url(#phoneClip2)">

    <!-- Status bar -->
    <rect x="0" y="0" width="375" height="48" fill="#eef1f8"/>
    <text x="187" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="#1a2040" text-anchor="middle">9:41</text>

    <!-- Page title -->
    <text x="187" y="80" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="700" fill="#1a2040" text-anchor="middle">マイページ</text>

    <!-- Accuracy Circles Card -->
    <g transform="translate(20, 100)">
      <rect x="0" y="0" width="335" height="170" rx="20" fill="white" filter="url(#cardShadow2)"/>

      <!-- Word accuracy circle -->
      <g transform="translate(80, 85)">
        <circle cx="0" cy="0" r="50" fill="none" stroke="#e2e6f0" stroke-width="8"/>
        <circle cx="0" cy="0" r="50" fill="none" stroke="url(#accGrad)" stroke-width="8"
                stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="69"
                transform="rotate(-90)"/>
        <text x="0" y="6" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700" fill="#1a2040" text-anchor="middle">78%</text>
      </g>
      <text x="80" y="152" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="#6b7494" text-anchor="middle">単語 正答率</text>

      <!-- Cloze accuracy circle -->
      <g transform="translate(255, 85)">
        <circle cx="0" cy="0" r="50" fill="none" stroke="#e2e6f0" stroke-width="8"/>
        <circle cx="0" cy="0" r="50" fill="none" stroke="url(#accGrad)" stroke-width="8"
                stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="107"
                transform="rotate(-90)"/>
        <text x="0" y="6" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700" fill="#1a2040" text-anchor="middle">66%</text>
      </g>
      <text x="255" y="152" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="#6b7494" text-anchor="middle">穴埋め 正答率</text>
    </g>

    <!-- Rank + Streak Cards -->
    <g transform="translate(20, 288)">
      <!-- Rank card -->
      <rect x="0" y="0" width="160" height="84" rx="20" fill="white" filter="url(#cardShadow2)"/>
      <circle cx="36" cy="42" r="22" fill="url(#btnGrad2)"/>
      <text x="36" y="48" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" fill="white" text-anchor="middle">&#127942;</text>
      <text x="70" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="500" fill="#6b7494">ランク</text>
      <text x="70" y="50" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" font-weight="700" fill="#1a2040">シルバー</text>
      <text x="70" y="65" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#6b7494">Lv.3  420 XP</text>
      <rect x="70" y="70" width="76" height="5" rx="2.5" fill="#e2e6f0"/>
      <rect x="70" y="70" width="30" height="5" rx="2.5" fill="url(#progressGrad2)"/>

      <!-- Streak card -->
      <rect x="175" y="0" width="160" height="84" rx="20" fill="white" filter="url(#cardShadow2)"/>
      <circle cx="211" cy="42" r="22" fill="#f97316"/>
      <text x="211" y="48" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" fill="white" text-anchor="middle">&#128293;</text>
      <text x="245" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="500" fill="#6b7494">連続学習</text>
      <text x="245" y="54" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="16" font-weight="700" fill="#1a2040">5日</text>
    </g>

    <!-- Learning Calendar Card -->
    <g transform="translate(20, 390)">
      <rect x="0" y="0" width="335" height="100" rx="20" fill="white" filter="url(#cardShadow2)"/>
      <text x="32" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" fill="#f97316">&#128293;</text>
      <text x="50" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" font-weight="700" fill="#1a2040">5日連続学習</text>

      <!-- Calendar heatmap -->
      <g transform="translate(20, 48)">
        <!-- Day labels -->
        <text x="21" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#9ca3bf" text-anchor="middle">土</text>
        <text x="63" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#9ca3bf" text-anchor="middle">日</text>
        <text x="105" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#9ca3bf" text-anchor="middle">月</text>
        <text x="147" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#9ca3bf" text-anchor="middle">火</text>
        <text x="189" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#9ca3bf" text-anchor="middle">水</text>
        <text x="231" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#9ca3bf" text-anchor="middle">木</text>
        <text x="273" y="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#9ca3bf" text-anchor="middle">金</text>
        <!-- Heatmap squares -->
        <rect x="5" y="18" width="32" height="32" rx="8" fill="#e2e6f0"/>
        <rect x="47" y="18" width="32" height="32" rx="8" fill="#e2e6f0"/>
        <rect x="89" y="18" width="32" height="32" rx="8" fill="#16a34a"/>
        <rect x="131" y="18" width="32" height="32" rx="8" fill="#16a34a"/>
        <rect x="173" y="18" width="32" height="32" rx="8" fill="#16a34a"/>
        <rect x="215" y="18" width="32" height="32" rx="8" fill="#16a34a"/>
        <rect x="257" y="18" width="32" height="32" rx="8" fill="#16a34a"/>
      </g>
    </g>

    <!-- Stats Grid -->
    <g transform="translate(20, 508)">
      <!-- 総回答数 -->
      <rect x="0" y="0" width="105" height="72" rx="20" fill="white" filter="url(#cardShadow2)"/>
      <text x="16" y="26" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="#6b7494" letter-spacing="1">総回答数</text>
      <text x="16" y="54" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700" fill="#1a2040">156</text>

      <!-- 正解数 -->
      <rect x="115" y="0" width="105" height="72" rx="20" fill="white" filter="url(#cardShadow2)"/>
      <text x="131" y="26" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="#6b7494" letter-spacing="1">正解数</text>
      <text x="131" y="54" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700" fill="#1a3a8a">122</text>

      <!-- 穴埋め回答数 -->
      <rect x="230" y="0" width="105" height="72" rx="20" fill="white" filter="url(#cardShadow2)"/>
      <text x="246" y="26" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" font-weight="600" fill="#6b7494" letter-spacing="0.5">穴埋め回答数</text>
      <text x="246" y="54" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" font-weight="700" fill="#1a2040">48</text>
      <text x="246" y="66" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="10" fill="#6b7494">(32正解)</text>
    </g>

    <!-- Bookmarked Words Card -->
    <g transform="translate(20, 598)">
      <rect x="0" y="0" width="335" height="120" rx="20" fill="white" filter="url(#cardShadow2)"/>
      <text x="20" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="700" fill="#1a2040" letter-spacing="0.5">ブックマーク単語</text>
      <text x="315" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="500" fill="#1a3a8a" text-anchor="end">ブックマークだけ練習 →</text>

      <!-- Table header -->
      <line x1="16" y1="40" x2="319" y2="40" stroke="#e2e6f0" stroke-width="1"/>
      <text x="20" y="56" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#6b7494">英語</text>
      <text x="140" y="56" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#6b7494">日本語</text>
      <text x="260" y="56" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#6b7494" text-anchor="end">スコア</text>

      <!-- Table rows -->
      <line x1="16" y1="64" x2="319" y2="64" stroke="#f0f2f8" stroke-width="1"/>
      <text x="20" y="82" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#1a2040">difficult</text>
      <text x="140" y="82" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#1a2040">難しい</text>
      <text x="260" y="82" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#6b7494" text-anchor="end">1 / 3</text>
      <text x="308" y="82" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#6b7494" text-anchor="end">&#9734;</text>

      <line x1="16" y1="92" x2="319" y2="92" stroke="#f0f2f8" stroke-width="1"/>
      <text x="20" y="110" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#1a2040">experience</text>
      <text x="140" y="110" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#1a2040">経験</text>
      <text x="260" y="110" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#6b7494" text-anchor="end">0 / 2</text>
      <text x="308" y="110" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#6b7494" text-anchor="end">&#9734;</text>
    </g>

    <!-- Bottom Navigation -->
    <rect x="0" y="740" width="375" height="72" fill="url(#navGrad2)"/>
    <g font-family="-apple-system,BlinkMacSystemFont,sans-serif">
      <text x="50" y="772" font-size="18" fill="white" opacity="0.6" text-anchor="middle">&#128214;</text>
      <text x="50" y="790" font-size="10" font-weight="600" fill="white" opacity="0.6" text-anchor="middle">学習</text>
      <text x="144" y="772" font-size="18" fill="white" opacity="0.6" text-anchor="middle">&#128278;</text>
      <text x="144" y="790" font-size="10" font-weight="600" fill="white" opacity="0.6" text-anchor="middle">復習</text>
      <!-- マイページ (active) -->
      <rect x="199" y="747" width="76" height="52" rx="16" fill="white" opacity="0.15"/>
      <text x="237" y="772" font-size="18" fill="white" text-anchor="middle">&#128100;</text>
      <text x="237" y="790" font-size="10" font-weight="600" fill="white" text-anchor="middle">マイページ</text>
      <text x="331" y="772" font-size="18" fill="white" opacity="0.6" text-anchor="middle">&#9881;</text>
      <text x="331" y="790" font-size="10" font-weight="600" fill="white" opacity="0.6" text-anchor="middle">管理</text>
    </g>

  </g>
</svg>
