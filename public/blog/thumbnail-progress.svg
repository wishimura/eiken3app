<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2460"/>
      <stop offset="50%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#2563b0"/>
    </linearGradient>
    <linearGradient id="accGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad2)"/>

  <!-- Decorative -->
  <circle cx="1050" cy="500" r="250" fill="white" opacity="0.03"/>
  <circle cx="200" cy="100" r="180" fill="white" opacity="0.03"/>

  <!-- Left: Text -->
  <g transform="translate(80, 80)">
    <text x="0" y="50" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif" font-size="20" font-weight="600" fill="#93c5fd" letter-spacing="3">LEARNING PROGRESS</text>

    <text x="0" y="110" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif" font-size="44" font-weight="800" fill="white">学習進捗の記録</text>

    <text x="0" y="170" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif" font-size="18" fill="#93c5fd" opacity="0.9">正答率 &#183; ブックマーク &#183; 復習モード &#183; クラウド同期</text>

    <!-- Feature pills -->
    <g transform="translate(0, 210)">
      <rect x="0" y="0" width="120" height="40" rx="20" fill="white" opacity="0.15"/>
      <text x="60" y="26" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">&#128200; 正答率</text>

      <rect x="135" y="0" width="150" height="40" rx="20" fill="white" opacity="0.15"/>
      <text x="210" y="26" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">&#9733; ブックマーク</text>

      <rect x="300" y="0" width="130" height="40" rx="20" fill="white" opacity="0.15"/>
      <text x="365" y="26" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">&#9729; クラウド保存</text>
    </g>

    <text x="0" y="340" font-family="-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif" font-size="16" font-weight="600" fill="white" opacity="0.5">英検3級 単語アプリ</text>
  </g>

  <!-- Right: Visual elements -->
  <g transform="translate(700, 60)">
    <!-- Accuracy circles -->
    <g transform="translate(120, 100)">
      <!-- Big circle -->
      <circle cx="0" cy="0" r="90" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="14"/>
      <circle cx="0" cy="0" r="90" fill="none" stroke="url(#accGrad2)" stroke-width="14"
              stroke-linecap="round" stroke-dasharray="565" stroke-dashoffset="124"
              transform="rotate(-90)"/>
      <text x="0" y="-6" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="40" font-weight="800" fill="white" text-anchor="middle">78%</text>
      <text x="0" y="20" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">単語 正答率</text>
    </g>

    <!-- Small circle -->
    <g transform="translate(320, 140)">
      <circle cx="0" cy="0" r="60" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="10"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#accGrad2)" stroke-width="10"
              stroke-linecap="round" stroke-dasharray="377" stroke-dashoffset="128"
              transform="rotate(-90)"/>
      <text x="0" y="-4" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="28" font-weight="800" fill="white" text-anchor="middle">66%</text>
      <text x="0" y="18" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">穴埋め 正答率</text>
    </g>

    <!-- Stats cards -->
    <g transform="translate(20, 290)">
      <rect x="0" y="0" width="140" height="80" rx="16" fill="white" opacity="0.1"/>
      <text x="20" y="30" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#93c5fd">総回答数</text>
      <text x="20" y="60" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="30" font-weight="800" fill="white">156</text>

      <rect x="160" y="0" width="140" height="80" rx="16" fill="white" opacity="0.1"/>
      <text x="180" y="30" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#93c5fd">正解数</text>
      <text x="180" y="60" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="30" font-weight="800" fill="white">122</text>

      <rect x="320" y="0" width="100" height="80" rx="16" fill="white" opacity="0.1"/>
      <text x="340" y="30" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" font-weight="600" fill="#93c5fd">穴埋め</text>
      <text x="340" y="60" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="30" font-weight="800" fill="white">48</text>
    </g>

    <!-- Bookmark indicator -->
    <g transform="translate(60, 400)">
      <rect x="0" y="0" width="320" height="50" rx="12" fill="white" opacity="0.08"/>
      <text x="20" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" font-weight="600" fill="white">&#9733; ブックマーク単語: 8件</text>
      <text x="300" y="32" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#93c5fd" text-anchor="end">練習する →</text>
    </g>
  </g>
</svg>
